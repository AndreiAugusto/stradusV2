<div class="background-colour-home">
    <app-menu></app-menu>
    
    <div class="container mt-5">
        <div class="row d-flex align-items-center mb-4">
            <div class="col-8">
                <h2 class="mb-3 title">Gestão de Motoristas</h2>
            </div>
            <div class="col-4">
                <button class="btn btn-edit float-end">
                    <i class="bi bi-plus-lg"></i>Adicionar Motorista
                </button>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-body">
                        <table class="table table-striped table-hover">
                            <thead>
                                <tr>
                                    <th scope="col">Nome</th>
                                    <th scope="col">Nascimento</th>
                                    <th scope="col">Nº Carteira</th>
                                    <th scope="col">Ações</th>
                                </tr>
                            </thead>
                            <tbody *ngIf="!isLoading">
                                <tr *ngFor="let motorista of motoristas">
                                    <td>{{ motorista.nome }}</td>
                                    <td>{{ motorista.nascimento }}</td>
                                    <td>{{ motorista.nCarteira }}</td>
                                    <td>
                                        <button class="btn btn-sm btn-edit me-2">
                                            <i class="bi bi-pencil"></i> Editar
                                        </button>
                                        <button class="btn btn-sm btn-danger">
                                            <i class="bi bi-trash"></i> Deletar
                                        </button>
                                    </td>
                                </tr>
                            </tbody>

                            <tbody *ngIf="isLoading">
                                <tr>
                                    <td colspan="4" class="text-center mt-3">
                                        <div class="spinner-border text-primary" role="status">
                                            <span class="visually-hidden">Carregando...</span>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                            
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
