<div class="card">
    <div class="card-body">
        <!-- Skeleton enquanto carrega -->
        <div *ngIf="isLoading" class="placeholder-glow">
            <h5 class="card-title placeholder" style="width: 100%; height: 1.5rem;"></h5>
            <p class="card-text placeholder placeholder-lg" style="width: 25%;"></p>
            <!-- <p class="card-text placeholder placeholder-lg" style="width: 80%;"></p> -->
            <div class="d-flex gap-2 mt-3">
                <a href="#" class="card-link placeholder" style="width: 80px;"></a>
                <a href="#" class="card-link placeholder" style="width: 100px;"></a>
            </div>
        </div>

        <!-- Conteúdo carregado -->
        <div *ngIf="!isLoading">
            <h5 class="card-title">{{ title }}</h5>
            <p class="card-text">{{ text }}</p>
            <a href="#" class="card-link">Card link</a>
            <a href="#" class="card-link">Another link</a>
        </div>
    </div>
</div>
